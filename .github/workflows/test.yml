name: DarkAtlas CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      # Stand up Postgres service container for async test suite
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: darkatlas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with Ruff
      run: |
        # stop the build if there are Python syntax errors or undefined names
        ruff check .

    - name: Check formatting with Black
      run: |
        black --check .

    - name: Run Pytest Suite
      env:
        # Override URI to point to local testing database
        POSTGRES_ASYNC_URI: postgresql+asyncpg://postgres:postgres@localhost:5432/darkatlas_test
        REDIS_URI: redis://localhost:6379/0
        JWT_SECRET: super-secret-jwt-key-for-darkatlas-asm-platform-2026
        STALE_THRESHOLD_DAYS: 30
      run: |
        pytest
